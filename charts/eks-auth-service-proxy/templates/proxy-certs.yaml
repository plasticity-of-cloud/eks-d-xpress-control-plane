apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: eks-auth-proxy-selfsigned
  namespace: {{ .Release.Namespace }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: eks-auth-proxy-ca
  namespace: {{ .Release.Namespace }}
spec:
  isCA: true
  commonName: eks-auth-proxy-ca
  secretName: eks-auth-proxy-ca
  issuerRef:
    name: eks-auth-proxy-selfsigned
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: eks-auth-proxy-ca
  namespace: {{ .Release.Namespace }}
spec:
  ca:
    secretName: eks-auth-proxy-ca
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: eks-auth-proxy-cert
  namespace: {{ .Release.Namespace }}
spec:
  secretName: eks-auth-proxy-tls
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: eks-auth-proxy-ca
    kind: Issuer
  dnsNames:
  - eks-auth-proxy.{{ .Release.Namespace }}.svc
  - eks-auth-proxy.{{ .Release.Namespace }}.svc.cluster.local
