proxy:
  image:
    repository: eks-auth-proxy
    tag: latest
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

webhook:
  enabled: true
  image:
    repository: eks-pod-identity-webhook
    tag: latest
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

clusterName: k3s-pod-id

aws:
  region: us-east-1
  # If using a credentials secret (not needed on EC2 with instance profile)
  credentialsSecret: ""
