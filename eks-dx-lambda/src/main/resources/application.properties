# Lambda handler
quarkus.lambda.handler=rest-handler
quarkus.http.port=8080

# DynamoDB tables
eks-dx.clusters-table=${EKS_DX_CLUSTERS_TABLE:eks-dx-clusters}
eks-dx.associations-table=${EKS_DX_ASSOCIATIONS_TABLE:eks-dx-associations}

# JWT validation
mp.jwt.verify.audiences=pods.eks.amazonaws.com

# STS
aws.sts.session-duration=PT1H

# SnapStart
quarkus.snapstart.enable=true

# Logging
quarkus.log.level=INFO
quarkus.log.category."ai.codriverlabs".level=DEBUG
