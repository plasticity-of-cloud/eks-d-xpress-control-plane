quarkus.application.name=eks-d-auth-cli
quarkus.log.level=WARN
quarkus.kubernetes-client.trust-certs=true

# Container image (Jib)
quarkus.container-image.group=plcloud
quarkus.container-image.name=eks-d-auth-cli
quarkus.container-image.tag=latest

# Native base image (distroless for minimal footprint)
quarkus.native.container-build=true
quarkus.native.builder-image=quay.io/quarkus/ubi-quarkus-graalvmce-builder-image:jdk-21
quarkus.jib.base-native-image=quay.io/quarkus/quarkus-distroless-image:2.0
