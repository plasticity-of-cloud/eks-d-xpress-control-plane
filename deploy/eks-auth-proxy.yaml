---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eks-auth-proxy
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eks-auth-proxy
  namespace: kube-system
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["pod-identity-associations"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eks-auth-proxy
  namespace: kube-system
subjects:
- kind: ServiceAccount
  name: eks-auth-proxy
  namespace: kube-system
roleRef:
  kind: Role
  name: eks-auth-proxy
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eks-auth-proxy
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eks-auth-proxy
  template:
    metadata:
      labels:
        app: eks-auth-proxy
    spec:
      serviceAccountName: eks-auth-proxy
      containers:
      - name: eks-auth-proxy
        image: eks-auth-proxy:latest
        ports:
        - containerPort: 8080
        env:
        - name: AWS_REGION
          value: "ap-south-1"
        - name: AWS_ACCOUNT_ID
          valueFrom:
            secretKeyRef:
              name: eks-auth-proxy-aws-creds
              key: account-id
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: eks-auth-proxy-aws-creds
              key: access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: eks-auth-proxy-aws-creds
              key: secret-access-key
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 5
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 5
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: eks-auth-proxy
  namespace: kube-system
spec:
  selector:
    app: eks-auth-proxy
  ports:
  - port: 8080
    targetPort: 8080
