---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eks-pod-identity-webhook
rules:
- apiGroups: ["eks.plasticity.cloud"]
  resources: ["podidentityassociations"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eks-pod-identity-webhook
subjects:
- kind: ServiceAccount
  name: eks-pod-identity-webhook
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: eks-pod-identity-webhook
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: eks-pod-identity-webhook-selfsigned
  namespace: kube-system
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: eks-pod-identity-webhook-ca
  namespace: kube-system
spec:
  isCA: true
  commonName: eks-pod-identity-webhook-ca
  secretName: eks-pod-identity-webhook-ca
  issuerRef:
    name: eks-pod-identity-webhook-selfsigned
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: eks-pod-identity-webhook-ca
  namespace: kube-system
spec:
  ca:
    secretName: eks-pod-identity-webhook-ca
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: eks-pod-identity-webhook-cert
  namespace: kube-system
spec:
  secretName: eks-pod-identity-webhook-tls
  issuerRef:
    name: eks-pod-identity-webhook-ca
    kind: Issuer
  dnsNames:
  - eks-pod-identity-webhook.kube-system.svc
  - eks-pod-identity-webhook.kube-system.svc.cluster.local
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: eks-pod-identity-webhook
  annotations:
    cert-manager.io/inject-ca-from: kube-system/eks-pod-identity-webhook-cert
webhooks:
- name: pod-identity.plasticity.cloud
  rules:
  - apiGroups: [""]
    apiVersions: ["v1"]
    operations: ["CREATE"]
    resources: ["pods"]
    scope: Namespaced
  clientConfig:
    service:
      namespace: kube-system
      name: eks-pod-identity-webhook
      path: /mutate
      port: 8443
  admissionReviewVersions: ["v1"]
  sideEffects: None
  timeoutSeconds: 5
  failurePolicy: Ignore
