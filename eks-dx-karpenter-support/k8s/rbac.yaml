---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eks-dx-karpenter-support
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eks-dx-karpenter-support
rules:
  # ClusterIdentityService: read cluster bootstrap ConfigMaps + kubernetes endpoint
  - apiGroups: [""]
    resources: ["endpoints"]
    resourceNames: ["kubernetes"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["kube-root-ca.crt", "kubeadm-config", "eks-dx-config"]
    verbs: ["get"]
  # Reconciler: watch EC2NodeClass resources
  - apiGroups: ["karpenter.k8s.aws"]
    resources: ["ec2nodeclasses"]
    verbs: ["get", "list", "watch"]
  # Reconciler: patch status subresource (ValidationSucceeded condition)
  - apiGroups: ["karpenter.k8s.aws"]
    resources: ["ec2nodeclasses/status"]
    verbs: ["patch"]
  # Leader election (Coordination API)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eks-dx-karpenter-support
subjects:
  - kind: ServiceAccount
    name: eks-dx-karpenter-support
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: eks-dx-karpenter-support
  apiGroup: rbac.authorization.k8s.io
