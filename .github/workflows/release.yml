name: Release

on:
  push:
    tags: ['v*']

permissions:
  id-token: write
  contents: write

env:
  JAVA_VERSION: '21'
  AWS_REGION: us-east-1

jobs:
  # ── Build + Test ─────────────────────────────────────────────────────
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
            jib-platform: linux/amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            jib-platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build and test
        run: mvn -B verify -DskipITs

      - name: Build Lambda function.zip
        run: mvn -B -pl eks-dx-lambda package -DskipTests

      - name: Build proxy image
        run: |
          mvn -B -pl eks-auth-proxy package -DskipTests \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=false \
            -Dquarkus.container-image.image=eks-auth-proxy:build \
            -Dquarkus.jib.platforms=${{ matrix.jib-platform }}

      - name: Build webhook image
        run: |
          mvn -B -pl eks-pod-identity-webhook package -DskipTests \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=false \
            -Dquarkus.container-image.image=eks-pod-identity-webhook:build \
            -Dquarkus.jib.platforms=${{ matrix.jib-platform }}

      - name: Save Docker images
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          docker save eks-auth-proxy:build | gzip > eks-auth-proxy-${VERSION}-linux-${{ matrix.arch }}.tar.gz
          docker save eks-pod-identity-webhook:build | gzip > eks-pod-identity-webhook-${VERSION}-linux-${{ matrix.arch }}.tar.gz

      - name: Build CLI native binary (GraalVM)
        run: |
          mvn -B -pl eks-dx-cli package -Pnative -DskipTests
          VERSION=${GITHUB_REF_NAME#v}
          cp eks-dx-cli/target/*-runner eks-dx-cli-${VERSION}-linux-${{ matrix.arch }}
        env:
          MAVEN_OPTS: '-Xmx10g'

      - name: Upload arch artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.arch }}
          retention-days: 1
          path: |
            eks-auth-proxy-*-linux-${{ matrix.arch }}.tar.gz
            eks-pod-identity-webhook-*-linux-${{ matrix.arch }}.tar.gz
            eks-dx-cli-*-linux-${{ matrix.arch }}

  # ── Package (arch-independent) ───────────────────────────────────────
  package:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build Lambda function.zip
        run: |
          mvn -B -pl eks-dx-lambda package -DskipTests
          VERSION=${GITHUB_REF_NAME#v}
          cp eks-dx-lambda/target/function.zip eks-dx-lambda-${VERSION}.zip

      - name: Build Helm charts
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn -B -pl eks-auth-proxy package -DskipTests \
            -Dquarkus.helm.version=${VERSION} \
            -Dquarkus.container-image.build=false
          mvn -B -pl eks-pod-identity-webhook package -DskipTests \
            -Dquarkus.helm.version=${VERSION} \
            -Dquarkus.container-image.build=false
          cp eks-auth-proxy/target/helm/kubernetes/eks-auth-proxy-${VERSION}.tar.gz .
          cp eks-pod-identity-webhook/target/helm/kubernetes/eks-pod-identity-webhook-${VERSION}.tar.gz .

      - name: Package SAM template
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar czf eks-dx-sam-${VERSION}.tar.gz sam.yaml

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-packages
          retention-days: 1
          path: |
            eks-dx-lambda-*.zip
            eks-auth-proxy-*.tar.gz
            eks-pod-identity-webhook-*.tar.gz
            eks-dx-sam-*.tar.gz

  # ── Deploy Lambda (code-only update) ─────────────────────────────────
  deploy-lambda:
    needs: [build, package]
    runs-on: ubuntu-24.04
    environment: production
    # Only deploy on tag push, not on PRs
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-packages
          path: artifacts

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Use official AWS Lambda deploy action for code-only updates.
      # For full stack changes (DynamoDB, API Gateway, alarms), use SAM deploy manually.
      - name: Deploy Lambda function
        uses: aws-actions/aws-lambda-deploy@v1.1.0
        with:
          function-name: eks-dx-service
          code-artifacts-dir: artifacts
          handler: io.quarkus.amazon.lambda.runtime.QuarkusStreamHandler::handleRequest
          runtime: java21
          memory-size: 512
          timeout: 30
          snap-start: '{"ApplyOn":"PublishedVersions"}'
          publish: true

  # ── Create GitHub Release ────────────────────────────────────────────
  release:
    needs: [build, package]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List release artifacts
        run: ls -lhR artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
