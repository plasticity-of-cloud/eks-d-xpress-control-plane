AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: EKS-DX Service — Pod Identity for k3s, microk8s, and EKS-D clusters

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: java21

Parameters:
  DomainName:
    Type: String
    Default: ""
    Description: Custom domain name (leave empty to skip)
  CertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN for custom domain

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref DomainName, ""]]

Resources:
  # --- REST API (v1) with IAM auth on management endpoints ---
  EksDxApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Auth:
        DefaultAuthorizer: AWS_IAM
      AccessLogSetting:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
      MethodSettings:
        - HttpMethod: "*"
          ResourcePath: "/*"
          LoggingLevel: INFO

  # --- Custom Domain ---
  ApiDomainName:
    Type: AWS::ApiGateway::DomainName
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref DomainName
      RegionalCertificateArn: !Ref CertificateArn
      EndpointConfiguration:
        Types: [REGIONAL]

  ApiMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: HasCustomDomain
    DependsOn: EksDxApiprodStage
    Properties:
      DomainName: !Ref DomainName
      RestApiId: !Ref EksDxApi
      Stage: prod

  # --- Lambda Function ---
  EksDxFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: io.quarkus.amazon.lambda.runtime.QuarkusStreamHandler::handleRequest
      CodeUri: eks-dx-lambda/target/function.zip
      AutoPublishAlias: live
      SnapStart:
        ApplyOn: PublishedVersions
      Environment:
        Variables:
          EKS_DX_CLUSTERS_TABLE: !Ref ClustersTable
          EKS_DX_ASSOCIATIONS_TABLE: !Ref AssociationsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClustersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AssociationsTable
        - Statement:
            Effect: Allow
            Action: [sts:AssumeRole, sts:TagSession]
            Resource: "arn:aws:iam::*:role/eks-dx-pod-*"
      Events:
        # Credential exchange — NO auth (token is in the body, validated by Lambda)
        Assets:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters/{name}/assets
            Method: POST
            Auth:
              Authorizer: NONE
        # Management endpoints — IAM auth (default)
        ClustersPost:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters
            Method: POST
        ClustersGet:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters
            Method: GET
        ClusterGet:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters/{name}
            Method: GET
        ClusterDelete:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters/{name}
            Method: DELETE
        ClusterJwks:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters/{name}/jwks
            Method: PUT
        # Association endpoints — no IAM auth (webhook uses SA token)
        AssociationsGet:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters/{name}/pod-identity-associations
            Method: GET
            Auth:
              Authorizer: NONE
        AssociationsPost:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters/{name}/pod-identity-associations
            Method: POST
        AssociationGet:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters/{name}/pod-identity-associations/{id}
            Method: GET
            Auth:
              Authorizer: NONE
        AssociationDelete:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters/{name}/pod-identity-associations/{id}
            Method: DELETE

  # --- DynamoDB Tables ---
  ClustersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: eks-dx-clusters
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: clusterName, AttributeType: S }
      KeySchema:
        - { AttributeName: clusterName, KeyType: HASH }

  AssociationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: eks-dx-associations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }

  # --- CloudWatch Alarms ---
  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: eks-dx-lambda-errors
      AlarmDescription: EKS-DX Lambda errors > 5 in 5 minutes
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref EksDxFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  LambdaThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: eks-dx-lambda-throttles
      AlarmDescription: EKS-DX Lambda throttles
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref EksDxFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  LambdaDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: eks-dx-lambda-p99-duration
      AlarmDescription: EKS-DX Lambda p99 duration > 5s
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref EksDxFunction
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 3
      Threshold: 5000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  DynamoDbThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: eks-dx-dynamodb-throttles
      AlarmDescription: DynamoDB throttled requests
      Namespace: AWS/DynamoDB
      MetricName: ThrottledRequests
      Dimensions:
        - Name: TableName
          Value: !Ref ClustersTable
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # --- CloudWatch Logs ---
  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/apigateway/eks-dx
      RetentionInDays: 30

Outputs:
  Endpoint:
    Description: EKS-DX API endpoint
    Value: !Sub "https://${EksDxApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  CustomEndpoint:
    Condition: HasCustomDomain
    Description: Custom domain endpoint
    Value: !Sub "https://${DomainName}"
  ClustersTableName:
    Value: !Ref ClustersTable
  AssociationsTableName:
    Value: !Ref AssociationsTable
  FunctionName:
    Value: !Ref EksDxFunction
  FunctionArn:
    Value: !GetAtt EksDxFunction.Arn
